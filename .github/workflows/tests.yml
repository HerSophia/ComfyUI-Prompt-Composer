name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 安装依赖
        run: python -m pip install --upgrade pip pyyaml

      - name: 运行单元测试
        run: python -m unittest discover -s tests
