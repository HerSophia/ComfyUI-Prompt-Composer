# 分类映射表
#
# 作用：把 zh_CN.yaml 里的「一级分类 > 二级 group」映射到 Prompt Composer 使用的分类。
# 键：  "一级分类 > 二级group"，与 zh_CN.yaml 中的名称一致（去掉引号和冒号）。
# 值：  我们的目标分类字符串；写 null 表示这一组丢弃，不导入。
#
# 说明：
# 1. 这一版聚焦角色生成，风格类（画质、艺术风格、颜色）、物品、汉服、魔法系、
#    反向提示词、NSFW、测试等暂不导入，统一标为 null。
# 2. 二创需要单独的 hair、eyes 分类来做锁定，所以人物相关拆得比设计里的九类更细。
# 3. 以后要纳入更多分类，只需在这里补映射，不用改代码。

mapping:
  # ---------- 人物 ----------
  "人物 > 对象": character
  "人物 > 身份": character
  "人物 > 二次元角色": null          # 角色名，走 identity/CSV 角色数据，不作为普通候选
